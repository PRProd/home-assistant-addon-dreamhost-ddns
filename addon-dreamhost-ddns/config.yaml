name: DreamHost DDNS
version: "1.1.0"
slug: dreamhost_ddns
description: Automatically updates Dreamhost A and AAAA records with your public IP.
url: https://github.com/PRProd/home-assistant-addon-dreamhost-ddns
startup: services
boot: auto
init: false
arch:
  - amd64
  - aarch64
  - armv7

options:
  dns_record: ""
  api_key: ""
  interval: 300
  ip_mode: both
  log_level: info

schema:
  dns_record: str
  api_key: password
  interval: int(173,8675309)
  ip_mode: list(both|ipv4|ipv6)
  log_level: list(trace|debug|info|warn|error)

map:
  - config:rw
